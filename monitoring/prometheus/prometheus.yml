global:
  scrape_interval: 20s
  evaluation_interval: 20s
  external_labels:
    project: unitree-rl-mjlab

scrape_configs:
  - job_name: tb-exporter
    static_configs:
      - targets:
          - tb-exporter:9105
        labels:
          source: rsl_rl

  - job_name: prometheus-self
    static_configs:
      - targets:
          - localhost:9090
