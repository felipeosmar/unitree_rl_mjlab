name: unitree-rl-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: rl-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  tb-exporter:
    build: ./tb-exporter
    container_name: rl-tb-exporter
    restart: unless-stopped
    environment:
      LOGS_ROOT: /logs/rsl_rl
      STATE_FILE: /state/offsets.json
      SCRAPE_PORT: "9105"
      SCAN_INTERVAL: "20"
    volumes:
      - ../logs:/logs:ro
      - tb_exporter_state:/state
    ports:
      - "9105:9105"

  loki:
    image: grafana/loki:2.9.10
    container_name: rl-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.10
    container_name: rl-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ../logs:/logs:ro
      - promtail_positions:/tmp
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.2.0
    container_name: rl-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_PANELS_ALLOW_LOCAL_MODE: "true"
      GF_INSTALL_PLUGINS: ""
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/unitree-training.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  promtail_positions:
  tb_exporter_state:
