server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: pipeline
    static_configs:
      - targets:
          - localhost
        labels:
          job: pipeline
          host: workstation
          __path__: /logs/pipeline/*.log
    pipeline_stages:
      - match:
          selector: '{job="pipeline"}'
          stages:
            - regex:
                expression: '^\[(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]'
            - timestamp:
                source: ts
                format: '2006-01-02 15:04:05'
                fallback_formats:
                  - RFC3339
            - regex:
                expression: '(?P<level>ERRO|ERROR|WARN|AVISO|INFO|CHECKPOINT)'
            - labels:
                level:

  - job_name: rsl_rl_text
    static_configs:
      - targets:
          - localhost
        labels:
          job: rsl_rl
          host: workstation
          __path__: /logs/*.log
